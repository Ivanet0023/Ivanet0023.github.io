<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodEx Delivery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <h1>FoodEx Delivery</h1>
    <nav>
        <ul>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#cart">Cart</a></li>
            <li><a href="#orders">My orders</a></li>
        </ul>
    </nav>
</header>

<main id="menu">
    <h2>Our menu</h2>
    <section class="menu_grid"></section>
</main>

<section id="cart">
    <h2>Cart</h2>
    <ul class="cart_list">
        <li class="cart_header">
            <span>Item</span> <span>Price</span> <span>Qty</span> <span>Sub</span>
        </li>
    </ul>
    <div class="cart_summary">
        <p class="cart_total"><strong>Total: 0 UAH</strong></p>
        <button id="checkout_btn">Place Order</button>
    </div>
</section>

<section id="orders">
    <h2>My orders</h2>
    <ul class="orders_list"></ul>
</section>

<footer>
    <h2>Contact us</h2>
    <p>FoodEx Delivery | +380 99 999 99 99 | Foodex@gmail.com</p>
</footer>

<script src="script.js"></script>
</body>
</html>
